name: Classplus → Google Drive Daily Sync

on:
  # ── Daily at 11:30 PM IST (6:00 PM UTC) ──────────────────────────────────
  schedule:
    - cron: '0 18 * * *'   # Every day at 6:00 PM UTC = 11:30 PM IST

  # ── Manual trigger (for testing / catch-up runs) ─────────────────────────
  workflow_dispatch:
    inputs:
      subject_index:
        description: 'Subject index (leave empty = all subjects)'
        required: false
        default: ''
      max_videos:
        description: 'Max videos to upload this run (default 35)'
        required: false
        default: '35'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yt-dlp
          pip install -r tools/ci/requirements.txt

      - name: Run Daily Sync
        env:
          CLASSPLUS_TOKEN:      ${{ secrets.CLASSPLUS_TOKEN }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID:     ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: |
          # Build command
          CMD="python3 tools/ci/sync.py"

          # Max videos (default 35 for scheduled runs)
          MAX="${{ github.event.inputs.max_videos }}"
          if [ -z "$MAX" ]; then MAX="35"; fi
          CMD="$CMD --max-videos $MAX"

          # Optional: specific subject
          IDX="${{ github.event.inputs.subject_index }}"
          if [ -n "$IDX" ]; then CMD="$CMD --subject-index $IDX"; fi

          echo "Running: $CMD"
          $CMD

      - name: Summary
        if: always()
        run: |
          echo "## Daily Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Run at: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Max videos this run: ${{ github.event.inputs.max_videos || '35' }}" >> $GITHUB_STEP_SUMMARY
