name: Classplus → Google Drive Sync

on:
  workflow_dispatch:
    inputs:
      subject_index:
        description: 'Subject index (0=all, 1=first, 2=second...)'
        required: false
        default: '0'
      max_videos:
        description: 'Max videos per subject (0=all, 1=test with 1)'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: |
          pip install yt-dlp
          pip install -r tools/ci/requirements.txt

      - name: Run Sync
        env:
          CLASSPLUS_TOKEN: ${{ secrets.CLASSPLUS_TOKEN }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        run: |
          IDX="${{ github.event.inputs.subject_index }}"
          MAX="${{ github.event.inputs.max_videos }}"
          CMD="python3 tools/ci/sync.py"
          [ "$IDX" != "0" ] && [ -n "$IDX" ] && CMD="$CMD --subject-index $((IDX - 1))"
          [ "$MAX" != "0" ] && [ -n "$MAX" ] && CMD="$CMD --max-videos $MAX"
          echo "Running: $CMD"
          $CMD
