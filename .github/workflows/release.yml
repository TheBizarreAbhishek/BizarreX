name: Build & Release BizarreX

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type: patch / minor / major'
        required: false
        default: 'patch'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for version calc

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── Auto-Calculate Version ───────────────────────────────────────────────
      - name: Calculate next version
        id: version
        run: |
          # Get latest tag, default to v1.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Strip the 'v' prefix
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=${PATCH:-0}
          
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'patch' }}"
          
          if [ "$RELEASE_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$RELEASE_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          VERSION_CODE=${{ github.run_number }}
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          
          echo "New version: $NEW_TAG (code: $VERSION_CODE)"

      # ── Inject secrets into local.properties ────────────────────────────────
      - name: Inject secrets
        run: |
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" >> local.properties
          echo "TG_CHAT_ID=${{ secrets.TG_CHAT_ID }}" >> local.properties
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> local.properties

      # ── Google Services JSON ─────────────────────────────────────────────────
      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      # ── Build Release APK ────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            -PversionName="${{ steps.version.outputs.new_version }}" \
            -PversionCode="${{ steps.version.outputs.version_code }}"
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/BizarreX-${{ steps.version.outputs.new_tag }}.apk

      # ── Tag & Create GitHub Release ──────────────────────────────────────────
      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: "BizarreX ${{ steps.version.outputs.new_tag }}"
          body: |
            ## 🚀 BizarreX ${{ steps.version.outputs.new_tag }}
            
            **Version Code:** ${{ steps.version.outputs.version_code }}
            **Built:** ${{ github.run_number }} | Commit: ${{ github.sha }}
            
            ### Install
            Download the APK below and install directly on your Android device.
          files: |
            app/build/outputs/apk/release/BizarreX-${{ steps.version.outputs.new_tag }}.apk
          draft: false
          prerelease: false
